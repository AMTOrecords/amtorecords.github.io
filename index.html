<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMTO Records</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    body {
      position: relative;
    }

    video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: black;
    }

    .icons {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      display: flex;
      gap: 22px;
      z-index: 2;
      opacity: 0;
      animation: fadeInIcons 1.6s ease forwards;
      animation-delay: 1.2s;
    }

    .icons a {
      color: white;
      font-size: 22px;
      opacity: 0.72;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .icons a:hover,
    .icons a:focus,
    .icons a:active {
      opacity: 1;
      transform: scale(1.15);
    }

    @keyframes fadeInIcons {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @media (max-width: 600px) {
      .icons {
        bottom: 22px;
        gap: 18px;
      }

      .icons a {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <video autoplay muted loop playsinline preload="auto">
    <source src="lv_0_20260320192328.mp4" type="video/mp4">
  </video>

  <div class="icons">
    <a href="https://open.spotify.com/album/1YrS9PMgvEPWKwztOWW7sJ?si=0hwpfQWkQeqUhxPufRXwsQ" target="_blank" aria-label="Spotify">
      <i class="fab fa-spotify"></i>
    </a>

    <a href="https://www.instagram.com/amtorecords?igsh=dmExZm5xZW4wb3M4" target="_blank" aria-label="Instagram">
      <i class="fab fa-instagram"></i>
    </a>

    <a href="https://www.tiktok.com/@amtorecords?_r=1&_t=ZN-94sRv4yaOSE" target="_blank" aria-label="TikTok">
      <i class="fab fa-tiktok"></i>
    </a>

    <a href="https://www.facebook.com/share/18KivqoEUK/" target="_blank" aria-label="Facebook">
      <i class="fab fa-facebook-f"></i>
    </a>
  </div>

</body>
</html>
