<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AMTO Records</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body, html {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      color: white;
      background: black;
    }

    /* HERO SECTION */
    .hero {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    /* VIDEO BACKGROUND */
    .hero video {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      transform: translate(-50%, -50%);
      object-fit: cover;
      z-index: -2;
    }

    /* DARK OVERLAY */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: -1;
    }

    /* CONTENT */
    .hero-content {
      position: relative;
      top: 50%;
      transform: translateY(-50%);
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.8;
    }

    /* BUTTONS */
    .buttons {
      margin-top: 25px;
    }

    .buttons a {
      display: inline-block;
      margin: 8px;
      padding: 12px 20px;
      border: 1px solid white;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .buttons a:hover {
      background: white;
      color: black;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      h1 {
        font-size: 2.2rem;
      }
    }
  </style>
</head>

<body>

  <section class="hero">

    <video autoplay muted loop playsinline>
      <source src="videos/hero.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="hero-content">
      <h1>AMTO Records</h1>
      <p>A memory that lives through music</p>

      <div class="buttons">
        <a href="https://open.spotify.com/" target="_blank">Spotify</a>
        <a href="https://youtube.com/" target="_blank">YouTube</a>
        <a href="https://instagram.com/" target="_blank">Instagram</a>
      </div>
    </div>

  </section>

</body>
</html>
