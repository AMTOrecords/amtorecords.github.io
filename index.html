<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMTO Records</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      font-family: Arial, sans-serif;
      color: white;
    }

    .hero {
      position: relative;
      height: 100vh;
      overflow: hidden;
      background: black;
    }

    video {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
      z-index: 1;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 2;
    }

    .content {
      position: relative;
      z-index: 3;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 56px;
      margin: 0 0 12px;
      letter-spacing: 1px;
    }

    p {
      font-size: 20px;
      margin: 0;
      opacity: 0.9;
    }

    @media (max-width: 600px) {
      h1 { font-size: 40px; }
      p { font-size: 16px; }
    }
  </style>
</head>

<body>

  <section class="hero">

    <!-- VIDEO BACKGROUND -->
    <video autoplay muted loop playsinline preload="auto" poster="fallback.jpg">
      <source src="videos/hero.mp4" type="video/mp4">
    </video>

    <!-- DARK OVERLAY -->
    <div class="overlay"></div>

    <!-- TEXT -->
    <div class="content">
      <h1>AMTO Records</h1>
      <p>A memory that lives through music</p>
    </div>

  </section>

</body>
</html>
