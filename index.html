<head>
  <meta charset="UTF-8" />

  <title>AMTO Records</title>

  <style>
    :root {
      --icon-size: 28px;
      --icon-gap: 24px;
      --icon-padding-y: 14px;
      --icon-padding-x: 18px;
      --glass-bg: rgba(0, 0, 0, 0.28);
      --glass-border: rgba(255, 255, 255, 0.14);
      --icon-color: rgba(255, 255, 255, 0.92);
      --icon-color-dim: rgba(255, 255, 255, 0.72);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    body {
      position: relative;
      color: white;
    }

    .stage {
      position: fixed;
      inset: 0;
      background: #000;
      overflow: hidden;
    }

    .bg-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      opacity: 0;
      animation: videoFade 1.2s ease forwards;
    }

    .top-fade {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom,
          rgba(0,0,0,0.38) 0%,
          rgba(0,0,0,0.12) 18%,
          rgba(0,0,0,0.00) 40%,
          rgba(0,0,0,0.00) 60%,
          rgba(0,0,0,0.14) 82%,
          rgba(0,0,0,0.42) 100%);
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      animation: overlayFade 1.4s ease forwards;
    }

    .vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center,
          rgba(0,0,0,0) 48%,
          rgba(0,0,0,0.10) 68%,
          rgba(0,0,0,0.24) 100%);
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      animation: overlayFade 1.6s ease forwards;
    }

    .icons-wrap {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      z-index: 3;
      opacity: 0;
      animation: iconsFade 1.2s ease forwards;
      animation-delay: 1s;
      width: max-content;
      max-width: calc(100vw - 24px);
    }

    .icons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--icon-gap);
      padding: var(--icon-padding-y) var(--icon-padding-x);
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 999px;
      box-shadow:
        0 10px 30px rgba(0,0,0,0.22),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .icons a {
      width: var(--icon-size);
      height: var(--icon-size);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--icon-color-dim);
      text-decoration: none;
      transition:
        transform 0.22s ease,
        opacity 0.22s ease,
        color 0.22s ease,
        filter 0.22s ease;
      cursor: pointer;
    }

    .icons a:hover,
    .icons a:focus-visible,
    .icons a:active {
      transform: translateY(-1px) scale(1.08);
      color: var(--icon-color);
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.16));
      outline: none;
    }

    .icons svg {
      width: 100%;
      height: 100%;
      fill: currentColor;
      display: block;
    }

    @keyframes videoFade {
      from { opacity: 0; transform: scale(1.015); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes overlayFade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes iconsFade {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @media (max-width: 700px) {
      :root {
        --icon-size: 26px;
        --icon-gap: 20px;
        --icon-padding-y: 12px;
        --icon-padding-x: 16px;
      }

      .icons-wrap {
        bottom: 18px;
      }
    }

    @media (max-width: 420px) {
      :root {
        --icon-size: 24px;
        --icon-gap: 18px;
        --icon-padding-y: 11px;
        --icon-padding-x: 14px;
      }

      .icons-wrap {
        bottom: 16px;
      }
    }
  </style>
</head>
