/* VIDEO FIT (NO CROPPING) */
video {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: black;
}

/* ICON BAR */
.icons {
  position: fixed;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 22px;
  z-index: 2;
  opacity: 0;
  animation: fadeIn 1.5s ease forwards;
  animation-delay: 1.2s;
}

/* ICON STYLE */
.icons a {
  width: 26px;
  height: 26px;
  opacity: 0.7;
  transition: 0.25s;
}

.icons a:hover {
  opacity: 1;
  transform: scale(1.15);
}

.icons svg {
  width: 100%;
  height: 100%;
  fill: white;
}

/* FADE IN */
@keyframes fadeIn {
  to {
    opacity: 1;
  }
}

/* MOBILE */
@media (max-width: 600px) {
  .icons {
    gap: 18px;
    bottom: 18px;
  }
}
