
<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love You, Bye — AMTO Records</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: black;
      color: white;
      overflow-x: hidden;
    }

    /* HERO */
    .hero {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 40px 20px;
    }

    .hero img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.8);
    }

    /* 🔥 WHITE EDGE GLOW */
    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center,
          rgba(255,255,255,0.08) 0%,
          rgba(0,0,0,0.0) 45%),
        linear-gradient(to top,
          rgba(0,0,0,0.95),
          rgba(0,0,0,0.2));
    }

    .hero-text {
      position: relative;
      z-index: 2;
      text-align: center;
      animation: fadeIn 1.5s ease;
    }

    h1 {
      font-size: 42px;
      margin: 0 0 10px;
      letter-spacing: 1px;
    }

    .subtitle {
      opacity: 0.7;
      font-size: 15px;
    }

    /* SECTION */
    .section {
      padding: 60px 20px;
      max-width: 700px;
      margin: auto;
      text-align: center;
      animation: fadeUp 1s ease;
    }

    iframe {
      width: 100%;
      border-radius: 12px;
      margin-top: 20px;
    }

    .note {
      margin-top: 30px;
      line-height: 1.7;
      opacity: 0.8;
    }

    .back {
      display: inline-block;
      margin-top: 40px;
      opacity: 0.5;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    .back:hover {
      opacity: 1;
    }

    /* ANIMATIONS */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>

<body>

  <!-- HERO -->
  <div class="hero">
    <img src="New Project.jpg">

    <div class="hero-text">
      <h1>Love You, Bye.</h1>
      <div class="subtitle">Um projeto feito de memória e presença</div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="section">

    <h2>Ouvir</h2>

    <iframe 
      src="https://open.spotify.com/embed/album/1YrS9PMgvEPWKwztOWW7sJ" 
      height="352" frameborder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>

    <div class="note">
      Um espaço onde a música se torna uma forma de continuar a falar  
      com quem nunca deixou verdadeiramente de estar.
    </div>

    <a href="index.html" class="back">← Voltar</a>

  </div>

</body>
</html>
