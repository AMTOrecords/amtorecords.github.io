<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love You, Bye — AMTO Records</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: black;
      color: white;
      overflow-x: hidden;
    }

    /* BLURRED BACKGROUND (APPLE STYLE) */
    .bg {
      position: fixed;
      inset: 0;
      background: url('New Project.jpg') center/cover no-repeat;
      filter: blur(40px) brightness(0.4);
      z-index: -1;
      transform: scale(1.1);
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }

    .cover {
      width: 85%;
      max-width: 420px;
      border-radius: 18px;

      /* WHITE EDGE + GLOW */
      box-shadow:
        0 0 0 2px rgba(255,255,255,0.08),
        0 0 60px rgba(255,255,255,0.25),
        0 30px 80px rgba(0,0,0,0.9);

      animation: fadeUp 1.2s ease;
    }

    h1 {
      margin-top: 25px;
      font-size: 38px;
      letter-spacing: 1px;
      animation: fadeUp 1.5s ease;
    }

    .subtitle {
      opacity: 0.7;
      margin-top: 10px;
      font-size: 15px;
    }

    /* SECTION */
    .section {
      padding: 60px 20px;
      max-width: 600px;
      margin: auto;
      text-align: center;
    }

    iframe {
      width: 100%;
      border-radius: 12px;
      margin-top: 20px;
    }

    .note {
      margin-top: 30px;
      line-height: 1.7;
      opacity: 0.85;
    }

    .back {
      display: inline-block;
      margin-top: 40px;
      opacity: 0.5;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    .back:hover {
      opacity: 1;
    }

    /* ANIMATION */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

  </style>
</head>

<body>

  <!-- BLURRED BACKGROUND -->
  <div class="bg"></div>

  <!-- HERO -->
  <div class="hero">
    <img class="cover" src="New Project.jpg">

    <h1>Love You, Bye.</h1>
    <div class="subtitle">Um projeto feito de memória e presença</div>
  </div>

  <!-- CONTENT -->
  <div class="section">

    <h2>Ouvir</h2>

    <iframe 
      src="https://open.spotify.com/embed/album/1YrS9PMgvEPWKwztOWW7sJ"
      height="352"
      frameborder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>

    <div class="note">
      Um espaço onde a música se torna uma forma de continuar a falar  
      com quem nunca deixou verdadeiramente de estar.
    </div>

    <a href="index.html" class="back">← Voltar</a>

  </div>

</body>
</html>
